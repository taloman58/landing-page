<!DOCTYPE html>
<html lang="tr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="account.reset.meta_title">Reset Password - GSM Ofis Pro</title>
    <meta name="description" data-i18n="account.reset.meta_desc" data-i18n-attr="content" content="Send a password reset link for your GSM Ofis Pro account.">
    <link rel="icon" type="image/png" href="../icon/favicon.png">
    <link rel="shortcut icon" type="image/png" href="../icon/favicon.png">
    <link rel="apple-touch-icon" href="../icon/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body data-page="account">
    <div class="bg-grid"></div>

    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="../index.html" class="nav-logo">
                <img src="../icon/favicon.png" class="logo-icon" alt="GSM Ofis Pro">
                <span data-i18n="nav.brand">GSM Ofis Pro</span>
            </a>
            <div class="nav-menu" id="nav-menu">
                <a href="../index.html" class="nav-link" data-i18n="nav.home">Home</a>
                <a href="../features.html" class="nav-link" data-i18n="nav.features">Features</a>
                <a href="../pricing.html" class="nav-link" data-i18n="nav.pricing">Pricing</a>
                <a href="login.html" class="nav-link active" data-i18n="nav.login">Login</a>
            </div>
            <div class="nav-actions">
                <a href="login.html" class="nav-cta" data-i18n="account.reset.back_login">Back to login</a>
            </div>
            <button class="nav-hamburger" id="nav-hamburger" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <main class="trial-main account-main">
        <div class="container--narrow">
            <div class="trial-header">
                <div class="section-badge" data-i18n="account.reset.badge">PASSWORD</div>
                <h1 data-i18n="account.reset.title">Reset password</h1>
                <p data-i18n="account.reset.subtitle">Enter your account email. We will send a secure reset link.</p>
            </div>

            <div class="form-card">
                <div id="account-error" class="form-error is-hidden" role="alert"></div>
                <div id="account-success" class="form-success is-hidden" role="status"></div>

                <form id="account-reset-form" novalidate>
                    <div class="form-grid form-grid--single">
                        <div class="form-field full-row">
                            <label for="account-email" data-i18n="account.common.email">Email</label>
                            <input id="account-email" name="email" type="email" autocomplete="email" required>
                        </div>
                    </div>

                    <button id="account-reset-submit" class="btn btn-primary form-submit" type="submit">
                        <span data-i18n="account.reset.submit">Send reset link</span>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/i18n.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/account-auth.js"></script>
</body>
</html>
